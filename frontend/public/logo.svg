<svg viewBox="0 0 560 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#152d6b"/>
      <stop offset="35%" stop-color="#1e6aac"/>
      <stop offset="70%" stop-color="#2d8dcb"/>
      <stop offset="100%" stop-color="#3da0d9"/>
    </linearGradient>
  </defs>

  <!-- Swoosh/road under box -->
  <path d="M 3 252 C 22 245 50 242 76 246 C 96 249 112 245 126 241"
        fill="none" stroke="#152d6b" stroke-width="7" stroke-linecap="round"/>

  <!-- Ballot box body -->
  <rect x="12" y="175" width="76" height="72" rx="6" fill="#152d6b"/>

  <!-- Slot -->
  <rect x="32" y="171" width="36" height="8" rx="4" fill="#091740"/>

  <!-- Paper (slightly rotated) -->
  <g transform="rotate(-11, 52, 155)">
    <rect x="42" y="134" width="20" height="40" rx="3" fill="#ffffff" stroke="#c0cfe0" stroke-width="1"/>
    <polyline points="45,153 50,161 61,147"
              fill="none" stroke="#1e6aac" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Large V / checkmark -->
  <polyline points="40,198 98,252 240,12"
            fill="none" stroke="url(#vg)"
            stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- OTERS -->
  <text x="146" y="232"
        font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
        font-size="108" font-weight="900"
        fill="#152d6b" letter-spacing="-2">OTERS</text>

  <!-- 4U.COM -->
  <text x="134" y="288"
        font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
        font-size="90" font-weight="900"
        fill="#3da0d9" letter-spacing="2">4U.COM</text>
</svg>
