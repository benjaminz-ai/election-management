      - RUNTIME
  - variable: GMAIL_APP_PASSWORD
    secret: GMAIL_APP_PASSWORD
    availability:
      - RUNTIME
  - variable: NEXT_PUBLIC_APP_URL
    value: https://election-management--election-management-145fc.europe-west4.hosted.app
    availability:
      - BUILD
      - RUNTIME
